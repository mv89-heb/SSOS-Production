services:
  - type: web
    name: ssos-platform
    env: python
    plan: starter
    pythonVersion: "3.11.9"
    healthCheckPath: /health
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "flask db upgrade"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT wsgi:app --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: MAX_UPLOAD_SIZE
        value: "5242880"
      - key: WTF_CSRF_ENABLED
        value: "True"
      - key: PYTHON_VERSION
        value: "3.11.9"
